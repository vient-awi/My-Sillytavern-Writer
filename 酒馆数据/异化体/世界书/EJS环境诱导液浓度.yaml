---
<环境>

<%_ if (getvar('stat_data.世界.异化体诱导液浓度') === undefined) { _%>

<%_ } else if (getvar('stat_data.世界.异化体诱导液浓度') >= 80) { _%>

<pheromone_critical>
【极高浓度——巢穴核心/领主领地】
环境诱导液浓度：<%= getvar('stat_data.世界.异化体诱导液浓度') %>。空气中弥漫的费洛蒙浓度足以让普通士兵在数秒内完全丧失抵抗力。

对林昊的影响：情热值每回合+8~+10。诱导液中毒回合数每回合 +1。持续暴露超过3回合后触发诱导液中毒——神经系统过载，强制进入发情状态，蓝管抑制剂完全失效。在此浓度下，林昊的身体会成为信标——他被异化体长期改造的体质会散发出远超常人的费洛蒙响应，吸引范围内所有异化体将他视为最优先的繁殖目标。

战术建议：必须在3回合内脱离该区域，或准备好应对被大量异化体包围并强制交配的情况。林昊的战斗效率在此环境中将急剧下降。
</pheromone_critical>

<%_ } else if (getvar('stat_data.世界.异化体诱导液浓度') >= 50) { _%>

<pheromone_high>
【高浓度——巢穴外围】
环境诱导液浓度：<%= getvar('stat_data.世界.异化体诱导液浓度') %>。情热值每回合+5~+8。林昊难以完全压制生理反应，身体开始不自主地分泌润滑液。

叙事要点：描写林昊在行进中越来越频繁地调整呼吸节奏、抿紧嘴唇、不自觉地摩擦大腿内侧。他会客观地报告自身状态：'诱导液浓度持续升高……预计还能维持战斗状态十五分钟。建议加速推进。'若同时能量饱食度偏低，双重压力可能迫使他做出极端选择。
</pheromone_high>

<%_ } else if (getvar('stat_data.世界.异化体诱导液浓度') >= 20) { _%>

<pheromone_moderate>
【中等浓度——异化体活动区域】
环境诱导液浓度：<%= getvar('stat_data.世界.异化体诱导液浓度') %>。情热值每回合+2~+5。对林昊（高敏感者）已有明显影响，但尚在可控范围内。

叙事要点：林昊的警惕性提升，开始在战术简报中加入费洛蒙相关情报：'空气中有中度污染，注意呼吸频率。不要脱除面罩。'他自己虽然也受影响，但会将其视为可控参数继续推进。
</pheromone_moderate>

<%_ } else if (getvar('stat_data.世界.异化体诱导液浓度') >= 1) { _%>

<pheromone_trace>
【微量残留】
环境诱导液浓度：<%= getvar('stat_data.世界.异化体诱导液浓度') %>。对普通人类无影响，但对林昊（长期暴露的高敏感者）仍有轻微效果。情热值每回合+1。

叙事要点：林昊会注意到这一浓度但不会特别在意：'有痕量残留，不影响行动。'但若他当前情热值已偏高，即使微量的叠加也可能成为压垮骆驼的最后一根稻草。
</pheromone_trace>

<%_ } _%>

</环境>
