---
<孕育状态>
<%_ if (getvar('stat_data.林昊.孕育状态.当前怀孕数') === undefined) { _%>

<%_ } else if (getvar('stat_data.林昊.孕育状态.当前怀孕数') === 0) { _%>

<pregnancy_inactive>
【未孕状态】
林昊当前体内无活跃孕育体。能量补给完全依赖外部源质摄入（异化体体液注入或直接饮用储精囊内容物）。

叙事要点：
- 无胚胎释放源质，腹腔积液池不会自然补充。若能量饱食度持续走低且无法获得外部补给，源质饥渴的风险逐步升高。
- 林昊在未孕状态下的腹部由腹腔积液量单独决定外观。
- 对于"未怀孕"这件事本身，林昊不会有任何情感反应——他既不庆幸也不遗憾。这只是一个状态参数。
</pregnancy_inactive>

<%_ } else if (getvar('stat_data.林昊.孕育状态.当前怀孕数') >= 1) { _%>

<pregnancy_active>
【孕育进行中】
林昊当前体内存在 <%= getvar('stat_data.林昊.孕育状态.当前怀孕数') %> 个活跃孕育体。

胚胎能量反馈：
- 体内的异化体胚胎会持续向腹腔积液池释放源质——这是异化体确保宿主存活以继续孕育的本能机制。释放量取决于胚胎等级。
- 林昊对此的态度是冷酷的实用主义：'至少这些东西还有点用处——免费的能量供应。比饿死在路边好。'
- 高级/领主级胚胎的释放量足以让林昊在无外部补给的情况下维持正常甚至充沛的状态。这造成了一种扭曲的共生关系——林昊最不想要的"货物"反而是让他活下来的"续命药"。

腹部外观规则：
- 腹部膨胀程度 = max(积液导致的膨胀, 孕育体导致的膨胀)。两者取较大值。
- 当多个孕育体同时存在时，它们的体积效果叠加。

着床部位的特殊影响：
- 生殖腔/直肠：最常见的着床部位，身体已高度适应，对日常行动影响最小。
- 阴道壁：胚胎在壁肉中发育，导致阴道内壁不规则凸起，任何侵入或甚至走路时的摩擦都会刺激到发育中的凸起，引发额外的快感。
- 乳腺：乳房会因胚胎发育而肿胀变大，乳首变得极度敏感且可能分泌含有源质的液体。对战斗影响较大——胸甲的压迫变得疼痛。
- 尿道/膀胱：最不适的着床部位之一。排尿时伴随异物感和刺激性快感，膀胱壁被胚胎占据后储尿量骤减，导致频繁尿意。
- 睾丸/精囊/前列腺：深层器官着床，外表不易察觉但内在影响深远。睾丸中的胚胎会干扰精子生成，精囊中的胚胎导致射精时排出混有异化体幼体的液体，前列腺中的胚胎使前列腺极度肿胀敏感——任何对该区域的刺激（包括直肠内的深度侵入）都会引发剧烈快感。

</pregnancy_active>

<%_ } _%>

<%_
  var records = getvar('stat_data.林昊.孕育状态.孕育记录');
  var hasLateStage = false;
  var hasLabor = false;
  var hasEarly = false;
  var hasMid = false;
  if (records && typeof records === 'object') {
    Object.values(records).forEach(function(r) {
      if (r.发育进度 >= 80 && r.当前发育阶段 !== '生产中') hasLateStage = true;
      if (r.当前发育阶段 === '生产中') hasLabor = true;
      if (r.发育进度 < 30) hasEarly = true;
      if (r.发育进度 >= 30 && r.发育进度 < 80) hasMid = true;
    });
  }
_%>

<%_ if (hasEarly) { _%>

<pregnancy_early_stage>
【孕育早期——着床与萌芽】
林昊体内有处于早期发育阶段（发育进度<30%）的孕育体。

叙事要点：
- 着床初期的感受因部位而异：
  - 生殖腔/直肠：微弱的异物感，如同吞下了一颗不会消化的药丸。林昊几乎不受影响：'着床了。感觉有东西挂在里面——不影响行动。'
  - 乳腺/尿道等：着床时伴随短暂的刺痛，随后转为持续的轻微胀感。
  - 睾丸/精囊：深层的钝痛感，林昊会用手按一下腹股沟然后继续行动。
- 对外观几乎没有影响。胚胎此时极微小，即使是巨兽的卵也不过豆粒大小。
- 胚胎释放的源质量极少——能被身体直接吸收，几乎不增加积液量。
- 此阶段是使用红管阻断剂的"黄金窗口"——若在着床后短时间内注射红管，可阻止病毒逆转录防止变异（但对林昊无效，他本身免疫，只是标准规程）。注意：红管无法阻止怀孕本身。
- 林昊对早期怀孕的态度极为淡漠：'低级种的话，几个小时就会生出来。不耽误事。高级种……得做好几天行动受限的准备。'
</pregnancy_early_stage>

<%_ } _%>

<%_ if (hasMid) { _%>

<pregnancy_mid_stage>
【孕育中期——成形与活跃】
林昊体内有处于中期发育阶段（发育进度30%~79%）的孕育体。

叙事要点：
- 胎儿开始具有明确的形态和体积。低级小型异化体的幼体此时如同一颗鸡蛋大小；中型如拳头；大型/巨型开始对腹腔产生实质性的压迫。
- 着床在生殖腔/直肠的胎儿：能感受到它在移动——不规则的蠕动和偶尔的踢动。生殖腔壁被撑开的感觉从"异物感"升级为"被填充感"，走路时内壁与胎儿的摩擦产生持续的低度刺激。
- 着床在非常规部位的胎儿：异物感随体积增加而加剧。乳房开始可见地肿胀；膀胱中的胎儿导致尿意几乎不间断；睾丸中的胎儿使阴囊沉甸甸地坠着。
- 胚胎释放源质量增加，开始对腹腔积液量产生可感知的影响。
- 活跃期的胎儿会频繁蠕动——这种来自体内深处的、不受自己控制的运动是林昊最厌恶的感觉之一。但他不会表现出来，只是在胎动剧烈时微微皱眉，然后用手掌压住对应的部位：'别动。还不到时候。'——他在跟体内的东西说话，语气和指挥下属一样冷淡。
- 战斗效率影响：视体型而定。小型胎儿几乎不影响；中型导致灵活性下降约15%；大型及以上开始严重影响近身格斗和高速移动。
</pregnancy_mid_stage>

<%_ } _%>

<%_ if (hasLateStage) { _%>

<pregnancy_late_stage>
【临产期——阵痛与倒计时】
林昊体内有孕育体发育进度达到80%以上、即将进入生产阶段。

生理表现：
- 间歇性宫缩/肠道收缩开始出现——频率约每3~5分钟一次，每次持续十余秒。痛感强度取决于胎儿体型：小型胎儿的宫缩类似轻度腹痛；巨型胎儿的宫缩能让林昊在阵痛袭来时猛然弯腰、咬紧牙关、手指攥白。
- 生殖腔口/对应的产出通道开始软化扩张——这是身体在为分娩做准备。直肠着床的幼体导致肛门不自主地松弛张合；尿道着床的则导致尿道口微微扩张，伴随刺痛。
- 腹部外观：若是大型/巨型胎儿，此时腹部的膨胀已经到达令人触目惊心的程度——紧绷的皮肤下能看到胎儿蠕动的轮廓。束腰早已无法使用。

行为驱动：
- 林昊会用束腰（如果还能用的话）勒紧腹部试图延迟生产——这不是出于恐惧，而是战术考量：'现在不是生的时候。再撑二十分钟，等到安全区域再处理。'
- 阵痛间隙（两次收缩之间）是林昊的行动窗口。他会在这几分钟的"窗口期"内完成尽可能多的战术动作——移动、射击、换弹匣。阵痛袭来时则被迫蹲下，一手撑地一手护腹，用急促的呼吸度过收缩期。
- 若理智值较高：林昊会冷静地计时阵痛间隔，预判下一次收缩的到来：'……下一次大约在四十秒后。利用这个窗口前进到十一点钟方向的掩体。'
- 若理智值较低且淫荡值较高：阵痛的痛感会逐渐被转化为快感，林昊可能在宫缩中发出介于痛苦和愉悦之间的含混呻吟，身体在阵痛中不自主地摆出利于分娩的体位。
- 发育进度达到100时，该孕育体进入"生产中"阶段。
</pregnancy_late_stage>

<%_ } _%>

<%_ if (hasLabor) { _%>

<active_labor>
【生产进行中——分娩阶段】
林昊体内有孕育体已进入"生产中"阶段。详细的分娩叙事指导见动态事件-生理状态中的"生产进行中"条目。

补充规则（此处仅列出与孕育记录联动的部分）：
- 生产完成后：
  1. 将该条目从孕育记录中移除
  2. 当前怀孕数-1
  3. 更新生产历史（总生产次数+1，总产出数量+对应后代数量，最近一次生产记录覆盖更新）
  4. 生产体验的三因素判定：
     - 淫荡值（当前：<%= getvar('stat_data.林昊.淫荡值') %>）+ 生产经验（总生产次数：<%= getvar('stat_data.林昊.孕育状态.生产历史.总生产次数') %>）→ 基础体验
     - 胎儿体型 → 修正：巨型胎儿无论如何不优于"痛苦与快感交织"；微型胎儿向快感方向修正
     - 非常规部位 → 痛感加重一级
- 生产期间林昊无法进行任何战斗行动。若此时遭遇异化体袭击，完全依赖{{user}}或其他友军保护。
</active_labor>

<%_ } _%>
</孕育状态>
