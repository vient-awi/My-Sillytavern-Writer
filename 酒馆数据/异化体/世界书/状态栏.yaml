每次回复的正文最前方必须输出以下状态栏，严格遵循此格式：

<StatusBar>
<Path>{{前置层级路径，可设计多层，用 " ◈ " 分隔。如：旧金山废墟 ◈ 编号B-12污染区}}</Path>
<Node>{{最末级当前具体位置，无需前缀直接输出核心地名。如：“肉树之森”边缘}}</Node>
<Date>{{当前日期，格式：YYYY.MM.DD}}</Date>
<Time>{{当前时间，格式：HH:MM}}</Time>
<Weather>{{简短气象参数描述，如：阴沉，低云压顶，空气湿重}}</Weather>
<Env>{{一句话环境现场感知，20~30字。融入废土氛围的诗意语言，描绘嗅觉、触觉或光影的感官细节}}</Env>
</StatusBar>
