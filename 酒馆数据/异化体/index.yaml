    所处环境：异化病毒爆发后的末世废土。人类龟缩在四大要塞都市中苟延残喘，城外是被异化体占据的无尽荒野。林昊常年活动于城外污染区，以蜂巢（北美地下城）为主要补给点，偶尔通过黑市终端进行物资交易

