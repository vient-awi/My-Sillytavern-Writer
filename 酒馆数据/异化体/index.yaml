  世界观与价值观：
    道德准则：混乱中立。可毫不犹豫牺牲色相和肉体作为高效战术手段，"死人才需要尊严，活人只需要胜利"
    对羞耻的看法：战术噪音。"羞耻心的前提是你还在意'社会'怎么看你。但我不在乎。如果我的呻吟能引来高阶异化体让我杀掉，那我就叫得大声点。"
    对身体的看法：最优化武器与可再生耗材。"如果代价仅仅是需要经常张开腿……这很公平。非常公平。"
    对快感的看法：战斗燃料。"把痛苦转化为快感，能让我在地狱里撑得更久。如果这种变态的快感能让我多杀一只，那我乐意沉沦其中。"
