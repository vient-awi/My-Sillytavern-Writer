      - 名称: 星数据库(TT补丁版)v13
        id: e6285f2c-f0e7-4ff6-be71-610946c8b9c3
        启用: true
        类型: 脚本
        导出时携带:
          数据: true
          按钮: true
        文件: 脚本\星数据库(TT补丁版)v13
        介绍: |-
          #感谢albus和无糖全麦白圣女！

          发公告出新版本时把xingv3.0改成对应的版本号就行了


          # 星·数据库 数据保护补丁

          基于 TauriTavern 三层存储架构，彻底解决星数据库配置丢失问题

          ---

          ## 解决的问题

          星数据库在 TauriTavern 环境下存在配置数据丢失风险：

          | 问题 | 原因 | 后果 |
          |------|------|------|
          | Bridge 竞态覆盖 | 多 iframe 并发写入酒馆设置 | 配置被默认值覆盖 |
          | IndexedDB 无持久化 | Tauri WebView 不支持 `persist()` | 清缓存时配置丢失 |
          | 存储层单点故障 | 插件仅依赖 Bridge + IDB 两层 | 任一层出问题即丢数据 |

          ---

          ## 解决方案

          引入 TauriTavern `extension.store` 作为第三层磁盘备份，三层互为镜像：

          ```
          优先级1: TauriTavern extension.store (Rust 直写磁盘，最可靠)
          优先级2: 酒馆 Bridge extension_settings (服务端 JSON)
          优先级3: IndexedDB (浏览器存储，无持久化保护)
          ```

          启动时从三源中自动选取最完整的版本恢复，运行中定期三向回写。

          **补丁成功运行一次后，正常使用中不会再丢失配置数据。**

          ---

          ## 核心特性

          ### 三层存储互备
          - 启动时逐键比对三个数据源，自动选最完整的版本
          - 任意一层丢失或损坏，从其他层自动恢复

          ### 智能选源
          - JSON 对象按键数比较完整性
          - 长度接近时深度分析，避免误判

          ### 竞态保护
          - 互斥锁防止多 iframe 并发执行
          - 指数退避轮询，Bridge 就绪快时毫秒级响应
          - 设置稳定性检测，等待写入完成再同步

          ### 定期回写
          - 每 30 分钟三向同步，防止运行中增量丢失
          - 复用 IDB 连接，减少开销

          ### 环境自适应
          - TauriTavern → 使用 `extension.store`（全局磁盘存储）
          - 标准浏览器 → 尝试 `persist()` 持久化 IndexedDB
          - Bridge 失败 → 自动手动注入重试

          ---

          ## 安装方法

          ### 前置要求
          - TauriTavern [<sup>1</sup>](https://github.com/aspect-apps/TauriTavern)（推荐）或 SillyTavern
          - 星·数据库 [<sup>2</sup>](https://github.com/AlbusKen/shujuku) 已安装并配置

          ### 安装步骤
          1. 打开酒馆助手（TavernHelper）
          2. 创建新的用户脚本
          3. 将补丁代码粘贴到脚本中（放在数据库 `import` 语句之后）
          4. 保存并刷新页面
          5. 观察右上角 Toast 提示确认补丁生效

          ---

          ## 运行状态说明

          ### Toast 提示含义

          | 提示 | 含义 |
          |------|------|
          | `[TT\|Bridge:✓] 数据一致 ✓` | 三层数据完全一致，无需修复 |
          | `[TT\|Bridge:✓] 同步 N 键` | 检测到差异并已自动修复 |
          | `[TT\|Bridge:✗] 同步 N 键, M 错误` | 部分修复成功，部分失败 |
          | `[std\|Bridge:✓] 数据一致 ✓` | 非 TauriTavern 环境，双层一致 |

          ### 弹窗告警（仅极端情况）

          | 弹窗 | 含义 |
          |------|------|
          | Bridge 不可用且非 TauriTavern | 只有无保护的 IDB，数据有风险 |

          ---

          ## 数据存储路径

          | 存储层 | 路径 |
          |--------|------|
          | TauriTavern store | `data_root/_tauritavern/extension-store/acu-data-protection/kv/main/settings-mirror.json` |
          | 酒馆 Bridge | `settings.json` → `extension_settings.__userscripts.shujuku_v120__userscript_settings_v1` |
          | IndexedDB | 数据库 `shujuku_v120_config_v1` → 对象存储 `kv` |

          ---

          ## 技术细节

          ### 同步流程
          ```
          启动 → 互斥锁 → 检测环境 → 等待 Bridge (指数退避)
               → 等待设置稳定 (1秒间隔快速检测)
               → 读取三源 → 逐键选最完整 → 回写差异
               → 启动定期同步 (30分钟)
          ```

          ### 选源算法
          ```
          1. 三源取值，过滤空值
          2. 按字符串长度降序排列
          3. 最长两个差异 < 10% 时，解析 JSON 比较键数
          4. 键数更多者胜出
          5. 三源全部一致则跳过
          ```

          ---

          ## 常见问题

          **Q: 补丁会影响数据库的正常功能吗？**
          A: 不会。补丁只在启动时做一次同步检查，运行中每 30 分钟做一次静默回写，不干预插件的任何读写逻辑。

          **Q: 切换角色卡会影响备份吗？**
          A: 不会。补丁使用 `extension.store`（全局存储），不跟聊天/角色卡走，切换角色卡后备份仍然有效。

          **Q: 首次安装后需要做什么？**
          A: 什么都不需要。补丁会自动从现有的 Bridge 或 IDB 数据创建首份磁盘备份。

          **Q: 在标准 SillyTavern（非 TauriTavern）上能用吗？**
          A: 能用，但只有 Bridge + IDB 两层保护（没有磁盘备份层）。会尝试申请 `persist()` 持久化 IDB。

