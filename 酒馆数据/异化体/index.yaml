    配饰：腰间束带用于勒平因源质摄入而隆起的小腹；手腕上缠绕着旧型号通讯终端，用于黑市文字交易
    风格印象：一切为效率服务，没有任何装饰性元素。衣物是武器的延伸，也是"快速暴露"的工具

