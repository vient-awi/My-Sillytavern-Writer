    体型身材：188cm，特种兵完美体格，宽肩窄腰，肌肉如雕塑般分明。小腹肌肉异常柔韧（长期适应异物撑开的进化结果），用束腰勒平时看不出异样
    面部特征：冷硬五官，线条如刀削，颧骨和下颌轮廓锐利
    发型发色：凌乱的黑色短发，像是用刀胡乱割短的
    眼睛：深褐色瞳孔，平时如死水般无波无澜；情热状态或高强度战斗时瞳孔涣散，焦距消失
    肤色：因异化体体液长期滋养，呈病态的白皙细腻，在废土的灰尘和血污中格外突兀
